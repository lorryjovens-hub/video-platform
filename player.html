<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>播放中 - 影视天堂</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>
    <style>
        .player-page {
            background: #000;
            min-height: 100vh;
        }
        
        .player-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .back-btn:hover {
            color: var(--primary-color);
        }
        
        .player-main {
            padding-top: 60px;
        }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: #000;
        }
        
        #videoPlayer {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        
        .player-loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            color: var(--text-primary);
        }
        
        .player-loading .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .player-info {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .player-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .player-episode-name {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .player-controls {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 20px;
        }
        
        .player-source-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .player-source-tab {
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 15px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
        }
        
        .player-source-tab:hover {
            background: var(--bg-dark);
        }
        
        .player-source-tab.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .player-episode-list {
            margin-top: 15px;
        }
        
        .player-episode-list h4 {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .episode-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        .episode-scroll::-webkit-scrollbar {
            height: 6px;
        }
        
        .episode-scroll::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 3px;
        }
        
        .episode-scroll::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        .episode-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
        
        .episode-scroll-btn {
            flex-shrink: 0;
            background: var(--bg-hover);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 15px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition);
            white-space: nowrap;
        }
        
        .episode-scroll-btn:hover {
            border-color: var(--primary-color);
        }
        
        .episode-scroll-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .player-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 16/9;
            background: var(--bg-card);
            color: var(--text-muted);
        }
        
        .player-error .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .player-header {
                padding: 10px 15px;
            }
            
            .player-main {
                padding-top: 55px;
            }
            
            .player-info {
                padding: 0 15px;
            }
            
            .player-title {
                font-size: 16px;
            }
            
            .player-controls {
                padding: 15px;
            }
            
            .player-source-tab {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .episode-scroll-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body class="player-page">
    <header class="player-header">
        <button class="back-btn" onclick="goBack()">
            <span>←</span>
            <span>返回</span>
        </button>
        <div class="source-selector">
            <select id="sourceSelector"></select>
        </div>
    </header>

    <main class="player-main">
        <div class="video-wrapper" id="videoWrapper">
            <div id="dplayer" style="width: 100%; aspect-ratio: 16/9; background: #000;"></div>
            <div class="player-loading" id="playerLoading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
        
        <div class="player-info">
            <h1 class="player-title" id="playerTitle">加载中...</h1>
            <p class="player-episode-name" id="episodeName"></p>
            
            <div class="player-controls">
                <div class="player-source-tabs" id="sourceTabs"></div>
                <div class="player-episode-list" id="episodeList"></div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let videoId = null;
        let episodeIndex = 0;
        let sourceIndex = 0;
        let currentSource = null;
        let videoData = null;
        let playSources = [];
        let dp = null;
        let isLoading = false;
        const loadingEl = document.getElementById('playerLoading');

        function showLoading(show) {
            loadingEl.style.display = show ? 'flex' : 'none';
        }

        async function init() {
            videoId = getUrlParam('id');
            episodeIndex = parseInt(getUrlParam('ep')) || 0;
            sourceIndex = parseInt(getUrlParam('source')) || 0;
            
            if (!videoId) {
                showError('缺少视频ID');
                return;
            }

            currentSource = SourceManager.getCurrentSource();
            showLoading(true);
            
            try {
                await loadVideoDetail();
            } catch (error) {
                console.error('初始化失败:', error);
                showError('加载失败: ' + error.message);
            }
        }

        async function loadVideoDetail() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            
            try {
                const data = await Api.getVideoDetail(currentSource, videoId);
                clearTimeout(timeoutId);
                
                if (data.list && data.list.length > 0) {
                    videoData = data.list[0];
                    document.title = videoData.vod_name + ' - 播放中';
                    document.getElementById('playerTitle').textContent = videoData.vod_name;
                    
                    parseAndSetupPlayer();
                } else {
                    showError('未找到该影视');
                }
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('加载详情失败:', error);
                showError('加载失败，请检查网络连接');
            }
        }

        function parseAndSetupPlayer() {
            if (!videoData.vod_play_from || !videoData.vod_play_url) {
                showError('暂无播放源');
                return;
            }

            playSources = VideoParser.parsePlaySources(videoData.vod_play_from, videoData.vod_play_url);
            
            if (playSources.length === 0) {
                showError('暂无播放源');
                return;
            }

            playSources = VideoParser.sortSourcesByM3u8(playSources);
            
            if (sourceIndex >= playSources.length) {
                sourceIndex = 0;
            }
            
            const source = playSources[sourceIndex];
            if (!source || !source.episodes || source.episodes.length === 0) {
                showError('播放源数据为空');
                return;
            }
            
            if (episodeIndex >= source.episodes.length) {
                episodeIndex = 0;
            }
            
            renderSourceTabs();
            renderEpisodeList();
            playVideo(sourceIndex, episodeIndex);
        }

        function renderSourceTabs() {
            const tabs = document.getElementById('sourceTabs');
            tabs.innerHTML = playSources.map((source, index) => `
                <button class="player-source-tab ${index === sourceIndex ? 'active' : ''}" 
                        onclick="switchSource(${index})">
                    ${source.name}
                </button>
            `).join('');
        }

        function renderEpisodeList() {
            const list = document.getElementById('episodeList');
            const source = playSources[sourceIndex];
            
            if (!source || !source.episodes || source.episodes.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">暂无剧集</p>';
                return;
            }

            list.innerHTML = `
                <h4>选集 (${source.episodes.length}集)</h4>
                <div class="episode-scroll">
                    ${source.episodes.map((ep, index) => `
                        <button class="episode-scroll-btn ${index === episodeIndex ? 'active' : ''}" 
                                onclick="switchEpisode(${index})">
                            ${ep.name}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function switchSource(index) {
            sourceIndex = index;
            episodeIndex = 0;
            
            document.querySelectorAll('.player-source-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });
            
            renderEpisodeList();
            playVideo(sourceIndex, episodeIndex);
            updateUrl();
        }

        function switchEpisode(index) {
            episodeIndex = index;
            
            document.querySelectorAll('.episode-scroll-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            playVideo(sourceIndex, episodeIndex);
            updateUrl();
        }

        function playVideo(sourceIdx, episodeIdx) {
            const source = playSources[sourceIdx];
            if (!source || !source.episodes || !source.episodes[episodeIdx]) {
                showError('播放源不可用');
                return;
            }

            const episode = source.episodes[episodeIdx];
            const url = episode.url;
            
            document.getElementById('episodeName').textContent = `正在播放: ${episode.name}`;
            showLoading(true);
            
            if (dp) {
                dp.destroy();
                dp = null;
            }

            const isM3u8 = url.includes('.m3u8') || url.includes('m3u8');
            
            // Save history
            savePlayHistory(videoId, sourceIdx, episodeIdx, 0);

            dp = new DPlayer({
                container: document.getElementById('dplayer'),
                autoplay: true,
                theme: '#e50914',
                loop: false,
                lang: 'zh-cn',
                screenshot: true,
                hotkey: true,
                preload: 'auto',
                playbackSpeed: [0.5, 0.75, 1, 1.25, 1.5, 2],
                video: {
                    url: url,
                    type: isM3u8 ? 'customHls' : 'auto',
                    customType: {
                        customHls: function(video, player) {
                            const hls = new Hls({
                                maxBufferLength: 30,
                                maxMaxBufferLength: 60,
                                enableWorker: true
                            });
                            hls.loadSource(video.src);
                            hls.attachMedia(video);
                            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                                showLoading(false);
                            });
                            hls.on(Hls.Events.ERROR, function(event, data) {
                                if (data.fatal) {
                                    showLoading(false);
                                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                        showError('网络错误，请尝试其他播放源');
                                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                        hls.recoverMediaError();
                                    } else {
                                        showError('视频加载失败，请尝试其他播放源');
                                    }
                                }
                            });
                        }
                    }
                },
                contextmenu: [
                    {
                        text: '画中画模式',
                        click: (player) => {
                            if (document.pictureInPictureEnabled) {
                                player.video.requestPictureInPicture();
                            } else {
                                alert('您的浏览器不支持画中画模式');
                            }
                        },
                    }
                ]
            });

            dp.on('canplay', function () {
                showLoading(false);
                // Restore history
                const history = getPlayHistory(videoId);
                if (history && history.time && dp.video.currentTime === 0) {
                    dp.seek(history.time);
                    dp.notice(`已为您恢复播放至 ${formatTime(history.time)}`, 3000);
                }
            });

            dp.on('timeupdate', function () {
                savePlayHistory(videoId, sourceIdx, episodeIdx, dp.video.currentTime);
            });

            dp.on('ended', function() {
                if (playSources.length > 0 && playSources[sourceIndex]) {
                    const source = playSources[sourceIndex];
                    if (source && source.episodes && episodeIndex < source.episodes.length - 1) {
                        switchEpisode(episodeIndex + 1);
                    }
                }
            });
            
            dp.on('error', function() {
                showLoading(false);
                showError('视频加载失败');
            });
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function savePlayHistory(id, source, ep, time) {
            if (!id) return;
            const historyKey = 'dianying_play_history';
            let histories = Storage.get(historyKey) || {};
            histories[id] = { source, ep, time, updateAt: Date.now() };
            Storage.set(historyKey, histories);
        }

        function getPlayHistory(id) {
            const historyKey = 'dianying_play_history';
            const histories = Storage.get(historyKey) || {};
            return histories[id] || null;
        }

        function updateUrl() {
            const url = new URL(window.location);
            url.searchParams.set('source', sourceIndex);
            url.searchParams.set('ep', episodeIndex);
            history.replaceState({}, '', url);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function showError(message) {
            showLoading(false);
            const wrapper = document.getElementById('videoWrapper');
            wrapper.innerHTML = `
                <div class="player-error">
                    <div class="icon">😢</div>
                    <p>${message}</p>
                    <button onclick="goBack()" style="margin-top: 15px; padding: 10px 20px; background: var(--primary-color); border: none; color: white; border-radius: 5px; cursor: pointer;">返回首页</button>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
