<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>影视天堂 - 免费在线观看</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <span class="logo-icon">🎬</span>
            <span>影视天堂</span>
        </a>
        <div class="header-right">
            <div class="source-selector">
                <select id="sourceSelector"></select>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索影视...">
                <button onclick="handleSearch()">搜索</button>
            </div>
            <a href="settings.html" class="settings-btn">
                <span>⚙️</span>
                <span>设置</span>
            </a>
        </div>
    </header>

    <main class="main-container">
        <div class="container">
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-id="0">全部</button>
            </nav>

            <div id="homeRecommendations" style="display: none;">
                <h2 class="section-title">🔥 热门推荐</h2>
                <div class="video-grid" id="hotGrid"></div>
            </div>

            <h2 class="section-title" id="sectionTitle">✨ 最新更新</h2>

            <div class="video-grid" id="videoGrid"></div>

            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <footer class="footer">
        <p>本站资源来自互联网，仅供学习交流使用</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let currentCategory = 0;
        let currentPage = 1;
        let categories = [];
        let currentSource = null;

        async function init() {
            currentSource = SourceManager.getCurrentSource();
            
            const pageFromUrl = getUrlParam('page');
            const categoryFromUrl = getUrlParam('category');
            const searchFromUrl = getUrlParam('wd');
            
            if (pageFromUrl) currentPage = parseInt(pageFromUrl);
            if (categoryFromUrl) currentCategory = parseInt(categoryFromUrl);
            
            if (searchFromUrl) {
                document.getElementById('searchInput').value = searchFromUrl;
                await handleSearch();
            } else {
                await loadCategories();
                if (currentCategory === 0 && currentPage === 1) {
                    document.getElementById('homeRecommendations').style.display = 'block';
                    await loadHotVideos();
                } else {
                    document.getElementById('homeRecommendations').style.display = 'none';
                }
                await loadVideos();
            }
        }

        async function loadHotVideos() {
            try {
                // Mock hot recommendations by fetching page 2 or random popular category
                const data = await Api.getVideoList(currentSource, { ac: 'list', pg: 2 });
                if (data.list && data.list.length > 0) {
                    const hotVideos = data.list.slice(0, 7); // Top 7 hot
                    renderHotGrid(hotVideos);
                }
            } catch (error) {
                console.error('加载热门推荐失败:', error);
            }
        }

        function renderHotGrid(videos) {
            const grid = document.getElementById('hotGrid');
            if (!videos || videos.length === 0) {
                grid.innerHTML = '<p class="no-data">暂无热门推荐</p>';
                return;
            }
            
            grid.innerHTML = videos.map(video => `
                <div class="video-card" onclick="goToDetail(${video.vod_id})" data-id="${video.vod_id}">
                    <div class="video-poster">
                        <div class="placeholder" id="hot-poster-${video.vod_id}">🎬</div>
                    </div>
                    ${video.vod_remarks ? `<span class="video-remarks">${video.vod_remarks}</span>` : ''}
                    <div class="video-info">
                        <div class="video-name">${video.vod_name}</div>
                        <div class="video-meta">
                            <span>${video.type_name || ''}</span>
                            <span style="color: var(--primary-color);">TOP</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // 异步加载热门推荐的海报
            videos.forEach(video => {
                PosterCache.fetchAndCache(video.vod_id, currentSource).then(posterUrl => {
                    const posterEl = document.getElementById(`hot-poster-${video.vod_id}`);
                    if (posterEl && posterUrl) {
                        // 处理相对路径，转换为绝对路径
                        let fullPosterUrl = posterUrl;
                        if (posterUrl.startsWith('/')) {
                            const apiUrl = currentSource.url;
                            const urlObj = new URL(apiUrl);
                            fullPosterUrl = `${urlObj.protocol}//${urlObj.host}${posterUrl}`;
                        } else if (!posterUrl.startsWith('http')) {
                            const apiUrl = currentSource.url;
                            const urlObj = new URL(apiUrl);
                            fullPosterUrl = `${urlObj.protocol}//${urlObj.host}/${posterUrl}`;
                        }
                        
                        const img = document.createElement('img');
                        img.src = fullPosterUrl;
                        img.alt = '海报';
                        img.loading = 'lazy';
                        img.style.width = '100%';
                        img.style.height = '100%';
                        img.style.objectFit = 'cover';
                        
                        img.onerror = function() {
                            posterEl.innerHTML = '<div class="placeholder"></div>';
                        };
                        
                        posterEl.innerHTML = '';
                        posterEl.appendChild(img);
                    }
                });
            });
        }

        async function reloadAll() {
            currentSource = SourceManager.getCurrentSource();
            currentCategory = 0;
            currentPage = 1;
            categories = [];
            
            document.getElementById('searchInput').value = '';
            document.getElementById('sectionTitle').textContent = '最新影视';
            
            const url = new URL(window.location);
            url.searchParams.delete('category');
            url.searchParams.delete('page');
            url.searchParams.delete('wd');
            history.pushState({}, '', url);
            
            await loadCategories();
            await loadVideos();
        }

        async function loadCategories() {
            try {
                const data = await Api.getVideoList(currentSource, { ac: 'list', pg: 1 });
                
                if (data.class && data.class.length > 0) {
                    categories = data.class;
                    renderCategories();
                } else {
                    renderCategories();
                }
            } catch (error) {
                console.error('加载分类失败:', error);
                renderCategories();
            }
        }

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            let html = '<button class="category-btn ' + (currentCategory === 0 ? 'active' : '') + '" data-id="0" onclick="selectCategory(0)">全部</button>';
            
            categories.forEach(cat => {
                html += '<button class="category-btn ' + (currentCategory === cat.type_id ? 'active' : '') + '" data-id="' + cat.type_id + '" onclick="selectCategory(' + cat.type_id + ')">' + cat.type_name + '</button>';
            });
            
            nav.innerHTML = html;
        }

        function selectCategory(categoryId) {
            currentCategory = categoryId;
            currentPage = 1;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.id) === categoryId) {
                    btn.classList.add('active');
                }
            });
            
            if (categoryId === 0) {
                document.getElementById('homeRecommendations').style.display = 'block';
            } else {
                document.getElementById('homeRecommendations').style.display = 'none';
            }
            
            const categoryName = categoryId === 0 ? '✨ 最新更新' : (categories.find(c => c.type_id === categoryId)?.type_name || '影视列表');
            document.getElementById('sectionTitle').textContent = categoryName;
            
            const url = new URL(window.location);
            url.searchParams.set('category', categoryId);
            url.searchParams.set('page', 1);
            url.searchParams.delete('wd');
            history.pushState({}, '', url);
            
            loadVideos();
        }

        async function loadVideos() {
            const grid = document.getElementById('videoGrid');
            UI.showLoading(grid);
            
            try {
                let data;
                if (currentCategory > 0) {
                    data = await Api.getVideosByCategory(currentSource, currentCategory, currentPage);
                } else {
                    data = await Api.getVideoList(currentSource, { pg: currentPage });
                }
                
                if (data.list && data.list.length > 0) {
                    renderVideoList(data.list);
                    UI.renderPagination(
                        parseInt(data.page) || currentPage,
                        parseInt(data.pagecount) || 1,
                        parseInt(data.total) || 0
                    );
                    
                    loadPostersAsync(data.list);
                    
                    // 预加载下一页，利用浏览器和服务器缓存
                    if (data.page < data.pagecount) {
                        Api.preloadNextPage(currentSource, currentCategory, currentPage);
                    }
                } else {
                    UI.showEmpty(grid, '暂无影视数据');
                    document.getElementById('pagination').innerHTML = '';
                }
            } catch (error) {
                console.error('加载视频列表失败:', error);
                UI.showError(grid, '加载失败，请检查数据源配置');
            }
        }

        function renderVideoList(videos) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = videos.map(video => UI.renderVideoCard(video)).join('');
        }

        async function loadPostersAsync(videos) {
            for (const video of videos) {
                UI.loadPosterAsync(video.vod_id, currentSource);
            }
        }

        async function handleSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                document.getElementById('homeRecommendations').style.display = 'block';
                loadVideos();
                return;
            }
            
            document.getElementById('homeRecommendations').style.display = 'none';
            const grid = document.getElementById('videoGrid');
            UI.showLoading(grid);
            document.getElementById('sectionTitle').textContent = `搜索: ${keyword}`;
            
            try {
                const data = await Api.searchVideos(currentSource, keyword);
                
                if (data.list && data.list.length > 0) {
                    renderVideoList(data.list);
                    document.getElementById('pagination').innerHTML = '';
                    loadPostersAsync(data.list);
                    
                    const url = new URL(window.location);
                    url.searchParams.set('wd', keyword);
                    url.searchParams.delete('category');
                    url.searchParams.delete('page');
                    history.pushState({}, '', url);
                } else {
                    UI.showEmpty(grid, `未找到 "${keyword}" 相关影视`);
                }
            } catch (error) {
                console.error('搜索失败:', error);
                UI.showError(grid, '搜索失败，请重试');
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });

        window.addEventListener('popstate', function() {
            const pageFromUrl = getUrlParam('page');
            const categoryFromUrl = getUrlParam('category');
            const searchFromUrl = getUrlParam('wd');
            
            currentPage = pageFromUrl ? parseInt(pageFromUrl) : 1;
            currentCategory = categoryFromUrl ? parseInt(categoryFromUrl) : 0;
            
            if (searchFromUrl) {
                document.getElementById('searchInput').value = searchFromUrl;
                handleSearch();
            } else {
                loadVideos();
            }
        });

        init();
    </script>
</body>
</html>
